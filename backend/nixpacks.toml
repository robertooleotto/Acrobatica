# Railway/Nixpacks config: assicura Python 3.12 + librerie di sistema necessarie
# a opencv-python (libGL, libglib) anche su slim images.
[phases.setup]
nixPkgs = ["python312", "gcc", "glibc"]
# libgomp1/libegl1/libusb: runtime richiesti da open3d (detector piani v2)
aptPkgs = ["libgl1", "libglib2.0-0", "libgomp1", "libegl1", "libusb-1.0-0", "libx11-6", "libxext6", "libsm6", "libice6", "libdrm2", "libxfixes3", "libxau6", "libxdmcp6"]

# NB: NON impostare LD_LIBRARY_PATH globale qui: in build romperebbe il Python
# di Nix (__vdso_time, glibc mescolate). Il path per open3d viene esteso SOLO
# nell'env del subprocess del detector (router facade_sessions).
[phases.install]
cmds = ["python -m venv /opt/venv && . /opt/venv/bin/activate && pip install --upgrade pip && pip install -r requirements.txt"]

[start]
cmd = "/opt/venv/bin/uvicorn app.main:app --host 0.0.0.0 --port $PORT"
