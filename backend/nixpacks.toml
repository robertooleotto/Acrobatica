# Railway/Nixpacks config: assicura Python 3.12 + librerie di sistema necessarie
# a opencv-python (libGL, libglib) anche su slim images.
[phases.setup]
nixPkgs = ["python312", "gcc", "glibc"]
aptPkgs = ["libgl1", "libglib2.0-0"]

[phases.install]
cmds = ["python -m venv /opt/venv && . /opt/venv/bin/activate && pip install --upgrade pip && pip install -r requirements.txt"]

[start]
cmd = "/opt/venv/bin/uvicorn app.main:app --host 0.0.0.0 --port $PORT"
