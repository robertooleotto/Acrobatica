name: Acrobatica
options:
  bundleIdPrefix: com.liscio.acrobatica
  deploymentTarget:
    iOS: "16.0"
  developmentLanguage: it
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "5.10"
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    TARGETED_DEVICE_FAMILY: "1"  # iPhone only

targets:
  Acrobatica:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: Acrobatica
    info:
      path: Acrobatica/Info.plist
      properties:
        CFBundleDisplayName: Acrobatica Facciate
        CFBundleShortVersionString: "0.2.0"
        CFBundleVersion: "1"
        LSRequiresIPhoneOS: true
        UIRequiredDeviceCapabilities:
          - arkit
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UILaunchScreen: {}
        NSCameraUsageDescription: "Acrobatica usa la fotocamera per rilevare e fotografare le facciate."
        NSPhotoLibraryUsageDescription: "Acrobatica salva le foto scattate nella tua libreria foto."
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true  # dev: backend localhost via HTTP. Tightener prima del deploy.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.liscio.acrobatica.facciate
        DEVELOPMENT_TEAM: UKMVCW2U67
        CODE_SIGN_STYLE: Automatic
        ENABLE_USER_SCRIPT_SANDBOXING: "NO"
        ENABLE_DEBUG_DYLIB: "NO"
        SWIFT_OBJC_BRIDGING_HEADER: ""
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: "NO"
